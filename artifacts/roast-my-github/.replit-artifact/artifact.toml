kind = "web"
previewPath = "/"
title = "Roast My GitHub"
version = "1.0.0"
id = "artifacts/roast-my-github"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20759

[services.development]
run = "pnpm --filter @workspace/roast-my-github run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/roast-my-github", "run", "build" ]
publicDir = "artifacts/roast-my-github/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20759"
BASE_PATH = "/"
